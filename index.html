<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Tracker Privado</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888;
            --accent: #00ffa3; /* Verde neón deportivo */
            --danger: #ff4757;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-weight: 300; letter-spacing: -1px; margin-bottom: 25px; color: var(--text-dim); }

        /* Panel de estadísticas */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .full-width { grid-column: span 2; border: 1px solid #333; }

        .label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .value { font-size: 2.2rem; font-weight: 800; color: var(--accent); }
        .unit { font-size: 0.9rem; color: var(--text-dim); }

        /* Controles */
        .controls {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #mainBtn { background: var(--accent); color: #000; }
        #mainBtn.active { background: var(--danger); color: #fff; }

        /* Historial */
        .history {
            margin-top: 40px;
            width: 100%;
            max-width: 400px;
            background: #111;
            border-radius: 20px;
            padding: 15px;
        }

        .history h2 { font-size: 1rem; color: var(--text-dim); margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .hist-list { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; }
        
        .hist-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
            font-size: 0.85rem;
        }

        .export-btn {
            background: transparent;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: underline;
            margin-top: 15px;
            padding: 5px;
        }
    </style>
</head>
<body>

    <h1>Mi Actividad</h1>

    <div class="grid">
        <div class="card full-width">
            <span class="label">Pasos Totales</span>
            <span class="value" id="steps">0</span>
        </div>
        <div class="card">
            <span class="label">Velocidad</span>
            <span class="value" id="speed">0.0</span>
            <span class="unit">km/h</span>
        </div>
        <div class="card">
            <span class="label">Distancia</span>
            <span class="value" id="dist">0.0</span>
            <span class="unit">km</span>
        </div>
        <div class="card full-width">
            <span class="label">Calorías Quemadas</span>
            <span class="value" id="kcal">0</span>
            <span class="unit">kcal</span>
        </div>
    </div>

    <div class="controls">
        <button id="mainBtn" onclick="toggleTracking()">INICIAR ENTRENAMIENTO</button>
        <button class="export-btn" onclick="exportarCSV()">Descargar datos (.csv)</button>
    </div>

    <div class="history">
        <h2>HISTORIAL (ÚLTIMOS 30 DÍAS)</h2>
        <ul id="histList" class="hist-list"></ul>
    </div>

    <script>
        let activo = false;
        let pasos = 0;
        let distancia = 0;
        let tiempoInicio;
        let sensorPasos;
        let watchID;

        // Cargar historial al iniciar
        window.onload = mostrarHistorial;

        function toggleTracking() {
            const btn = document.getElementById('mainBtn');
            if (!activo) {
                iniciar();
                btn.innerText = "TERMINAR Y GUARDAR";
                btn.classList.add('active');
            } else {
                detener();
                btn.innerText = "INICIAR ENTRENAMIENTO";
                btn.classList.remove('active');
            }
        }

        function iniciar() {
            activo = true;
            pasos = 0;
            distancia = 0;
            tiempoInicio = Date.now();

            // 1. Iniciar GPS (Velocidad y Distancia)
            if (navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(pos => {
                    let s = pos.coords.speed || 0;
                    document.getElementById('speed').innerText = (s * 3.6).toFixed(1);
                    // Cálculo aproximado de distancia si no hay saltos de GPS
                    if(s > 0.5) {
                        distancia += (s / 1000); // simplificado
                        document.getElementById('dist').innerText = distancia.toFixed(2);
                    }
                }, err => console.log(err), { enableHighAccuracy: true });
            }

            // 2. Iniciar Pasos (Acelerómetro)
            if ('LinearAccelerationSensor' in window) {
                sensorPasos = new LinearAccelerationSensor({ frequency: 60 });
                let ultimoMag = 0;
                sensorPasos.addEventListener('reading', () => {
                    let mag = Math.sqrt(sensorPasos.x**2 + sensorPasos.y**2 + sensorPasos.z**2);
                    if (mag > 12 && ultimoMag < 12) {
                        pasos++;
                        document.getElementById('steps').innerText = pasos;
                        actualizarKcal();
                    }
                    ultimoMag = mag;
                });
                sensorPasos.start();
            }
        }

        function detener() {
            activo = false;
            if(sensorPasos) sensorPasos.stop();
            if(watchID) navigator.geolocation.clearWatch(watchID);
            
            guardarEnHistorial();
            mostrarHistorial();
            
            // Reset visual
            document.getElementById('speed').innerText = "0.0";
        }

        function actualizarKcal() {
            // Fórmula simple: 0.04 kcal por paso aprox
            document.getElementById('kcal').innerText = Math.floor(pasos * 0.04);
        }

        function guardarEnHistorial() {
            const hoy = new Date().toLocaleDateString();
            const record = {
                fecha: hoy,
                pasos: pasos,
                km: distancia.toFixed(2),
                kcal: document.getElementById('kcal').innerText
            };

            let hist = JSON.parse(localStorage.getItem('historial_fit')) || [];
            hist.unshift(record);
            localStorage.setItem('historial_fit', JSON.stringify(hist.slice(0, 30)));
        }

        function mostrarHistorial() {
            const lista = document.getElementById('histList');
            const hist = JSON.parse(localStorage.getItem('historial_fit')) || [];
            lista.innerHTML = hist.map(item => `
                <li class="hist-item">
                    <span style="color:var(--accent)">${item.fecha}</span>
                    <span>${item.pasos} pasos | ${item.km} km</span>
                </li>
            `).join('');
        }

        function exportarCSV() {
            let hist = JSON.parse(localStorage.getItem('historial_fit')) || [];
            let csv = "Fecha,Pasos,Distancia_KM,Kcal\n" + 
                      hist.map(i => `${i.fecha},${i.pasos},${i.km},${i.kcal}`).join("\n");
            
            let blob = new Blob([csv], { type: 'text/csv' });
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = 'mi_actividad.csv';
            a.click();
        }
    </script>
</body>
</html>
